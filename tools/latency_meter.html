<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>High-Precision Latency Meter</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --text-color: #f8fafc;
            --accent-color: #38bdf8;
            --font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-family);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 2rem;
            border-radius: 1.5rem;
            background: rgba(30, 41, 59, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 2rem;
            color: var(--accent-color);
            letter-spacing: -0.025em;
        }

        .timer {
            font-family: 'Monaco', 'Consolas', monospace;
            font-size: 8rem;
            font-weight: 700;
            margin: 1rem 0;
            background: linear-gradient(to bottom, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(56, 189, 248, 0.2);
        }

        .milliseconds {
            font-size: 4rem;
            opacity: 0.7;
        }

        .instructions {
            margin-top: 2rem;
            font-size: 0.875rem;
            color: #94a3b8;
            max-width: 400px;
            line-height: 1.5;
        }

        .controls {
            margin-top: 2rem;
        }

        button {
            background-color: var(--accent-color);
            color: #000;
            border: none;
            padding: 0.75rem 1.5rem;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(56, 189, 248, 0.4);
        }

        button:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>ADV-02 Latency Meter</h1>
        <div class="timer" id="timer">
            <span id="seconds">00</span><span class="milliseconds">.</span><span id="ms" class="milliseconds">000</span>
        </div>
        <div class="controls">
            <button id="startStopBtn">Start Timer</button>
        </div>
        <p class="instructions">
            Point your camera at this screen and capture a photo containing both this display and the streamed image. Subtract the values to calculate total end-to-end latency.
        </p>
    </div>

    <script>
        let startTime;
        let running = false;
        let animationFrame;

        const secondsDisplay = document.getElementById('seconds');
        const msDisplay = document.getElementById('ms');
        const btn = document.getElementById('startStopBtn');

        function updateTimer() {
            const now = performance.now();
            const elapsed = now - startTime;
            
            const seconds = Math.floor(elapsed / 1000) % 60;
            const milliseconds = Math.floor(elapsed % 1000);

            secondsDisplay.textContent = seconds.toString().padStart(2, '0');
            msDisplay.textContent = milliseconds.toString().padStart(3, '0');

            if (running) {
                animationFrame = requestAnimationFrame(updateTimer);
            }
        }

        btn.addEventListener('click', () => {
            if (!running) {
                startTime = performance.now();
                running = true;
                btn.textContent = 'Stop Timer';
                updateTimer();
            } else {
                running = false;
                btn.textContent = 'Start Timer';
                cancelAnimationFrame(animationFrame);
            }
        });
    </script>
</body>
</html>
